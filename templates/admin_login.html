{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
    <div class="glass-card rounded-3xl p-8">
        <h1 class="font-display-lg text-display-lg mb-6 text-center">Admin Login</h1>
        <form method="post" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-medium text-on-surface-variant mb-2">Password</label>
                <input type="password" id="password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-violet-500/30 focus:border-violet-500/50 transition-all">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-violet-600 to-primary-container text-white font-headline-md py-3 rounded-xl shadow-[0_10px_20px_rgba(124,58,237,0.3)] hover:shadow-[0_15px_30px_rgba(124,58,237,0.5)] hover:-translate-y-0.5 active:scale-[0.98] transition-all">
                Login
            </button>
        </form>
    </div>
</main>
{% endblock %}
